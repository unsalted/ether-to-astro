name: Paper-cut
description: Report small UX, API, formatting, or workflow friction that should be easy to improve.
title: "[Paper-cut]: "
labels:
  - paper-cut
body:
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - MCP
        - CLI
        - Docs
        - Skill workflow
        - Mixed / not sure
    validations:
      required: true

  - type: textarea
    id: friction
    attributes:
      label: Current friction
      description: What is awkward or annoying today?
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: Desired improvement
      description: What small change would make this noticeably better?
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: How are you working around it now?

  - type: textarea
    id: user_story
    attributes:
      label: User story
      description: Optional but helpful. Use “As a..., I want..., so that...”

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Keep this small and concrete.
      placeholder: |
        - Response includes...
        - Docs show...
        - A client no longer needs to...
    validations:
      required: true

